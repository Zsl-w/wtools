name: wtools
description: "极简桌面应用与文件快速搜索工具"
publish_to: 'none'
version: 0.4.1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  window_manager: ^0.5.1
  tray_manager: ^0.3.2
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.ico
